<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Game</title>
</head>

<body>
    <h1>Enter PIN (6-Digit Number): <input type="text" id="id_room"></h1>
    <h1>Enter Username: <input type="text" id="username"></h1>
    <button id="join-game-button">Join Game</button>
    <div id="data-display"></div>
    <a href="index.html" id="exitButton">Exit</a>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDLY7ie39rKxvU_Evkq-VK25uvlVgqm6yQ",
            authDomain: "diesesi-spiel-ist-gesund.firebaseapp.com",
            databaseURL: "https://diesesi-spiel-ist-gesund-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "diesesi-spiel-ist-gesund",
            storageBucket: "diesesi-spiel-ist-gesund.appspot.com",
            messagingSenderId: "419197734080",
            appId: "1:419197734080:web:834d4e0854eed5cec53125"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let docRef; // To store the document reference for the game room
        let currentUser = {}; // To store the current player's information
        let inactivityTimeout; // To track inactivity

        // Check if the page was visited after navigating from create_game.html
        if (sessionStorage.getItem("fromCreateGame") === "true") {
            document.getElementById('id_room').value = "";
            document.getElementById('username').value = "";
            sessionStorage.removeItem("fromCreateGame"); // Reset the flag after clearing
        }

        // Function to join the game
        async function joinGame(docId, username) {
            try {
                docRef = doc(db, "multiplayers", docId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // Check if the game status is "started"
                    if (data.game_status === "started") {
                        // Transition to the interactive game content
                        document.body.innerHTML = getInteractiveGameContent();
                        runInteractiveGameScript();
                        return;
                    }

                    // Real-time listener for the game room document
                    onSnapshot(docRef, (doc) => {
                        if (doc.exists()) {
                            const data = doc.data();
                            const displayDiv = document.getElementById('data-display');
                            let content = "<h2>Game Room Data:</h2>";
                            for (const key in data) {
                                if (data.hasOwnProperty(key)) {
                                    content += `<p><strong>${key}:</strong> ${data[key]}</p>`;
                                }
                            }
                            displayDiv.innerHTML = content;

                            // Check if the game status changes to "started" and transition to the new game content
                            if (data.game_status === "started") {
                                document.body.innerHTML = getInteractiveGameContent();
                                runInteractiveGameScript();
                            }

                            // Check if the player has been removed from the game
                            const playerExists = data.players.some(player => player.name === currentUser.name);
                            if (!playerExists) {
                                alert("You have been kicked out of the game.");
                                window.location.href = "index.html"; // Redirect to index.html
                            }
                        } else {
                            alert("The room has been deleted.");
                            window.location.href = "index.html"; // Redirect to index.html
                        }
                    });

                    if (username) {
                        // Add the player to the Firestore document's players array
                        currentUser = { name: username, role: 'player' };
                        await updateDoc(docRef, {
                            players: arrayUnion(currentUser)
                        });
                        console.log("Joined game successfully with username:", username);

                        // Start the inactivity timer
                        startInactivityTimer();
                    } else {
                        alert("You must enter a username to join the game.");
                    }
                } else {
                    alert("No game found with that PIN. Please try again.");
                }
            } catch (error) {
                console.error("Error reading document:", error);
                alert("An error occurred while trying to join the game.");
            }
        }

        // Function to start the inactivity timer
        function startInactivityTimer() {
            // Clear any existing timer
            clearTimeout(inactivityTimeout);

            // Set a timer for 5 minutes (300,000 milliseconds)
            inactivityTimeout = setTimeout(async () => {
                if (docRef && currentUser.name) {
                    // Remove the player from the Firestore document's players array
                    await updateDoc(docRef, {
                        players: arrayRemove(currentUser)
                    });
                    console.log("Player removed from the game due to inactivity.");
                    alert("You have been removed from the game due to inactivity.");
                    window.location.href = "index.html"; // Redirect to index.html
                }
            }, 300000); // 5 minutes
        }

        // Event listener for the "Join Game" button
        document.getElementById('join-game-button').addEventListener('click', () => {
            const roomId = document.getElementById('id_room').value;
            const username = document.getElementById('username').value;

            if (roomId && username) {
                joinGame(roomId, username);
            } else {
                alert("Please enter both a 6-digit PIN and your username.");
            }
        });

        // Reset the inactivity timer on user interaction (e.g., mouse or keyboard activity)
        window.addEventListener('mousemove', startInactivityTimer);
        window.addEventListener('keydown', startInactivityTimer);

        // Handle player removal when the "Exit" button is clicked
        document.getElementById('exitButton').addEventListener('click', async (event) => {
            event.preventDefault(); // Prevent the default link behavior
            if (docRef && currentUser.name) {
                // Remove the player from the Firestore document's players array
                await updateDoc(docRef, {
                    players: arrayRemove(currentUser)
                });
                console.log("Player removed from the game on exit.");
            }
            // Redirect to the index.html page after player removal
            window.location.href = "index.html";
        });

        // Function to return the HTML content for the interactive game
        function getInteractiveGameContent() {
            return `
            <style>
                body {
                    font-family: Arial, sans-serif;
                    background-color: #f5f5f5;
                    margin: 0;
                    padding: 20px;
                    text-align: center;
                }
                #game-container {
                    background-color: #fff;
                    padding: 20px;
                    border-radius: 10px;
                    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                    max-width: 600px;
                    margin: auto;
                }
                #game-output {
                    font-size: 18px;
                    margin-bottom: 20px;
                }
                #choices-container button {
                    margin: 10px;
                    padding: 10px 20px;
                    font-size: 16px;
                    cursor: pointer;
                    border: none;
                    border-radius: 5px;
                    background-color: #007bff;
                    color: #fff;
                    transition: background-color 0.3s;
                }
                #choices-container button:hover {
                    background-color: #0056b3;
                }
                #result-before, #result-after {
                    font-size: 16px;
                    margin-bottom: 20px;
                }
            </style>
            <div id="game-container">
                <div id="game-output"></div>
                <div id="choices-container"></div>
                <div id="result-before"></div>
                <div id="result-after"></div>
            </div>
            `;
        }

        // Function to run the interactive game script after content is loaded
        function runInteractiveGameScript() {
            let playerStatus = Array(15).fill().map(() => [0, 0, 0, 0]);
        let currentStep = 0;
        let dinnerChoice = '';

        function displayMessage(message) {
            document.getElementById('game-output').innerText = message;
        }

        function clearChoices() {
            document.getElementById('choices-container').innerHTML = '';
        }

        function addChoice(text, onClick) {
            const button = document.createElement('button');
            button.innerText = text;
            button.onclick = onClick;
            document.getElementById('choices-container').appendChild(button);
        }

        function startGame() {
            displayMessage("Day 1 ตื่นเช้ามากินอะไรดีน้าาาา");
            clearChoices();
            addChoice("ข้าวแกง", () => makeChoice(0, [2.6, 21.6, 50.1, 621.4], "Day 1 ข้าวแกง", lunchChoices));
            addChoice("ขนมปัง", () => makeChoice(0, [2, 2, 5, 100], "Day 1 ขนมปัง", lunchChoices));
            addChoice("ไม่กิน", () => makeChoice(0, [0, 0, 0, 0], "Day 1 ไม่กินดีกว่า", lunchChoices));
        }

        function makeChoice(step, status, message, nextStep) {
            playerStatus[step] = status;
            displayMessage(message);
            nextStep();
        }

        function lunchChoices() {
            displayMessage("Day 1 เที่ยงแล้วไปหาอะไรกินกันนนนน");
            clearChoices();
            addChoice("ก๋วยเตี๋ยว", () => makeChoice(1, [0.4, 2.1, 4.5, 180], "Day 1 ก๋วยเตี๋ยว", dinnerChoices));
            addChoice("เบอร์เกอร์", () => makeChoice(1, [0, 10, 13, 266], "Day 1 เบอร์เกอร์", dinnerChoices));
            addChoice("ไม่กิน", () => makeChoice(1, [0, 0, 0, 0], "Day 1 ไม่กินดีกว่า", dinnerChoices));
        }

        function dinnerChoices() {
            displayMessage("Day 1 เย็นแล้วหาอะไรกินดีกว่า");
            clearChoices();
            addChoice("ข้าวแกง", () => {
                dinnerChoice = 'ข้าวแกง';
                randomEvent([3.6, 25.6, 60.1, 690.4], "Day 1 ข้าวแกง");
            });
            addChoice("ขนมปัง", () => {
                dinnerChoice = 'ขนมปัง';
                randomEvent([2, 2, 5, 100], "Day 1 ขนมปัง");
            });
            addChoice("ไม่กิน", () => {
                dinnerChoice = 'ไม่กิน';
                randomEvent([0, 0, 0, 0], "Day 1 ไม่กินดีกว่า");
            });
        }

        function randomEvent(status, message) {
    playerStatus[2] = status;
    displayMessage(message);
    clearChoices();
    
    if (Math.random() < 0.5) {
        if (Math.random() < 0.5) {
            // Change background color to blue for the running event
            document.body.style.backgroundColor = '#87CEEB'; // Light blue

            addChoice("ไปวิ่งดีกว่าค่อยกลับแล้วกัน", () => {
                playerStatus[2] = [
                    playerStatus[2][0] - 45,
                    playerStatus[2][1] - 4,
                    playerStatus[2][2] - 60,
                    playerStatus[2][3] - 650
                ];
                endDay();
            });
            addChoice("เหนื่อยแล้วกลับบ้านดีกว่าา", () => endDay());
        } else if (dinnerChoice !== 'ขนมปัง' && dinnerChoice !== 'ข้าวแกง') {
            // Change background color to red for the buffet event
            document.body.style.backgroundColor = '#FF6347'; // Tomato red

            addChoice("ไปกินบุฟเฟ่กับเพื่อนดีกว่า", () => {
                playerStatus[2] = [
                    playerStatus[2][0] + 21,
                    playerStatus[2][1] + 40,
                    playerStatus[2][2] + 140,
                    playerStatus[2][3] + 1000
                ];
                endDay();
            });
            addChoice("เหนื่อยแล้วกลับบ้านดีกว่าา", () => endDay());
        } else {
            endDay();
        }
    } else {
        endDay();
    }
}


        function endDay() {
            // Calculate totals
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {
                    playerStatus[3][j] += playerStatus[i][j];
                }
            }
            playerStatus[3][3] += 500; // Add extra calories

            // Display the results before adjustment
            let resultBefore = `Before Adjustment: น้ำตาล: ${playerStatus[3][0].toFixed(1)}, ไขมัน: ${playerStatus[3][1].toFixed(1)}, โปรตีน: ${playerStatus[3][2].toFixed(1)}, แคลอรี่: ${playerStatus[3][3].toFixed(1)}`;
            document.getElementById('result-before').innerText = resultBefore;

            // Adjust the results with Math.abs and display them
            playerStatus[4] = [
                Math.abs(playerStatus[3][0]) - 16,
                Math.abs(playerStatus[3][1]) - 78,
                Math.abs(playerStatus[3][2]) - 105,
                Math.abs(playerStatus[3][3]) - 1800
            ];

            let resultAfter = `After Adjustment: น้ำตาล: ${playerStatus[4][0].toFixed(1)}, ไขมัน: ${playerStatus[4][1].toFixed(1)}, โปรตีน: ${playerStatus[4][2].toFixed(1)}, แคลอรี่: ${playerStatus[4][3].toFixed(1)}`;
            document.getElementById('result-after').innerText = resultAfter;

            determineEnding();
        }

        function determineEnding() {
            // Clear the screen before showing the ending
            clearChoices();

            // Check the player's final status and determine the ending
            if (
                Math.abs(playerStatus[4][0]) < 16 &&
                Math.abs(playerStatus[4][1]) < 78 &&
                Math.abs(playerStatus[4][2]) < 105 &&
                Math.abs(playerStatus[4][3]) < 900
            ) {
                if (Math.random() < 0.5) {
                    displayMessage("คนคุยคุณชวนคุณไปเลี้ยงบุพเฟ่");
                } else {
                    displayMessage("คนคุยคุณตอบตกลงเป็นแฟน");
                }
            } else {
                const ending1 = Math.random() < 0.5;
                const ending2 = Math.random() < 0.5;
                if (ending1) {
                    displayMessage("คุณเครียดจนฆ่าตัวตาย");
                } else if (ending2) {
                    displayMessage("อยู่ๆคนคุยคุณก็บล๊อคคุณ");
                } else {
                    displayMessage("ระหว่างข้ามถนน อยู่ๆก็มีรถบรรทุกวิ่งมาด้วยความเร็วสูงแล้วชนใส่คุณอย่างจัง คุณได้เกิดใหม่ในโลกที่ไม่มีของหวาน");
                }
            }

            // Add Play Again and Exit buttons
            addChoice("เล่นอีกครั้ง", () => location.reload());
            addChoice("ออก", () => window.location.href = "index.html");
        }

        // Start the game on page load
            startGame();
        }

    </script>
</body>

</html>
