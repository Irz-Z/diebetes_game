<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieses spiel ist gesund</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease-in-out;
        }
        /* Name Input Screen */
        .yourname {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        .formyourname {
            display: flex;
            flex-direction: column;
        }
        .formyourname input {
            padding: 15px 20px;
            margin-bottom: 20px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s ease-in-out;
        }
        .formyourname input:focus {
            border-color: #8bc34a;
        }
        .formyourname button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #8bc34a;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }
        .formyourname button:hover {
            background-color: #7cb342;
        }
        /* Main Container */
        .container {
            display: none;
            color: #333;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }
        /* Text Display */
        .text {
            margin-bottom: 20px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ccc #fff;
            opacity: 1;
            transform: translateY(20px);
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
        .text.show {
            opacity: 1;
            transform: translateY(0);
        }
        .text p {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 18px;
        }
        .text::-webkit-scrollbar {
            width: 8px;
        }
        .text::-webkit-scrollbar-track {
            background: #fff;
        }
        .text::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 8px;
        }
        /* Choice Buttons */
        .choice {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .choice button {
            flex: 1 1 calc(50% - 15px);
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #8bc34a;
            color: white;
            transition: background-color 0.3s ease-in-out;
            opacity: 1;
            transform: translateY(20px);
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out, background-color 0.3s ease-in-out;
        }
        .choice button.show {
            opacity: 1;
            transform: translateY(0);
        }
        .choice button:hover {
            background-color: #7cb342;
        }
        /* Image Container Styling */
        #image-container {
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }
        #image-container img {
            max-width: 30%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            opacity: 1;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
        #image-container.show img {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        @media (max-width: 600px) {
            .choice button {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <div class="yourname" id="yourname">
        <form class="formyourname">
            <input type="text" class="name" placeholder="กรุณาใส่ชื่อผู้เล่น" id="playerName" required>
            <button type="button" class="start" id="start">เริ่ม</button>
        </form>
    </div>
    <div class="container" id="container">
        <div id="image-container"></div>
        <div class="text">
            <p id="text"></p>
        </div>
        <div class="choice" id="choiceContainer">
            <button id="choice1" value="1" style="display: none;">Choice 1</button>
            <button id="choice2" value="2" style="display: none;">Choice 2</button>
            <button id="choice3" value="3" style="display: none;">Choice 3</button>
            <button id="choice4" value="4" style="display: none;">Choice 4</button>
        </div>
    </div>
    <script>
        let player_choice = {};
        let currentScenario = 0;
        let playerName = '';
        
        function checkForImage(message) {
            const imagePattern = /\{\((.*?)\)\}/; 
            const match = message.match(imagePattern);

            if (match) {
                const imageUrl = match[1]; 
                const imageContainer = document.getElementById('image-container');
                imageContainer.innerHTML = `<img src="img/${imageUrl}" alt="Scenario Image" />`;
                return message.replace(imagePattern, '');
            }
            return message;
        }



        function typewriter(text, callback, speed = 20) {
            let i = 0;
            const p = document.getElementById('text');
            p.innerText = '';  
            p.classList.remove('show');

            text = text.replace(/คุณ/g, playerName);

            function printChar() {
                if (i < text.length) {
                    if (text.charAt(i) === '\n') {
                        setTimeout(() => {
                            p.innerText = '';
                            i++;  
                            printChar();
                        }, 3000);
                    } else {
                        p.innerText += text.charAt(i);
                        i++;
                        p.scrollTop = p.scrollHeight;
                        setTimeout(printChar, speed);
                    }
                } else {
                    p.classList.add('show');
                    if (callback) {
                        setTimeout(callback, 500);
                    }
                }
            }

            setTimeout(() => {
                p.classList.add('show');
                printChar();
            }, 500);
        }




        function choice_select(index, assign, message, ...choices) {
            player_choice[index] = { assign: assign, message: message, choice: '' };
            const cleanMessage = checkForImage(assign);
            
            if (assign !== null) {
                typewriter(cleanMessage, function() {
                    choices.forEach((choice, i) => {
                        const button = document.getElementById('choice' + (i + 1));
                        if (button) {
                            button.style.display = 'block';
                            button.innerText = choice;
                            button.onclick = function() {
                                player_choice[index].choice = choice;
                                hideButtons();
                                currentScenario++;
                                setTimeout(nextScenario, 3000);
                            };
                        }
                    });
                });
            }
        }


        function hideButtons() {
            document.querySelectorAll('.choice button').forEach(button => {
                button.style.display = 'none';
                button.classList.remove('show');
            });
        }

        function clearImage() {
            const imageContainer = document.getElementById('image-container');
            if (imageContainer) {
                imageContainer.innerHTML = '';  
                imageContainer.style.display = 'none';  
            }
        }


        function nextScenario() {
        if (currentScenario === 0) {
            player_choice[currentScenario] = ["{(0img.png)}คุณ เป็นนักเรียนม.ปลายหนึ่งในหลายๆคนที่อยากเข้าคณะแพทย์ดังนั้นคุณจึงได้เลือกไปฝึกประสบการณ์ที่โรงพยาบาลแห่งหนึ่ง", null, null, currentScenario];
            const message = player_choice[currentScenario][0];
            const cleanMessage = checkForImage(message);
            typewriter(cleanMessage, function() {
                document.getElementById('text').innerText += "\n";
                currentScenario++;
                setTimeout(nextScenario, 3000);
            });
        }
            else if (currentScenario === 1) {
                //clearImage();

                }

                else{

                    const message = player_choice[currentScenario][0];
                    const cleanMessage = checkForImage(message);
                    typewriter(cleanMessage, function() {
                        document.getElementById('text').innerText += "\n";
                        currentScenario++;
                        setTimeout(nextScenario, 3000);
                    });
                }
            }
            else if (currentScenario === 3){
                console.log(player_choice[2]);
                console.log(player_choice[2][2]);
                if(player_choice[2].choice === "แผนกผู้ป่วยนอกก่อนจะได้เห็นตั้งแต่การรับคนไข้" || player_choice[2][2] === "หมออาร์มให้ไปแผนกผู้ป่วยนอกก่อน"){
                    player_choice[currentScenario] = ["{(3.1img.png)}พี่บิว : สวัสดีค่ะ น้องชื่อ คุณ ใช่ไหม\nคุณ : ใช่ครับ\nพี่บิว : พี่ขอแนะนำตัวก่อนนะ พี่ชื่อบิวนะคะ พี่จะพาน้องดูว่าพี่ๆเนี่ยทำงานกันยังไงบ้าง เริ่มจากการรับผู้ป่วยก่อนนะ \n..พี่บิวเล่า\nคุณ : เอ่อ..พี่ครับ แผนกนี้ส่วนใหญ่เจอเคสอะไรบ้างครับ\nพี่บิว : ส่วนใหญ่ก็เคสเจ็บปวยทั่วไปนี่แหละ เช่น อุบัติเหตุเล็กน้อย ไม่สบาย ปวดท้อง อะไรพวกนี้\nคุณ : แล้วเคสไหนมาประจำล่ะครับ\nพี่บิว : เคสที่มาประจำคือผู้ป่วยเบาหวานที่มาตรวจร่างกายตามนัดหน่ะ \nคุณ : อย่างงี้นี่เอง ตามที่ผมคิดไว้เลย\nบิว เห็นคนอื่นๆเป็นกันเยอะหรอ\nคุณ : ใช่ครับ ทั้งแม่และญาติคนอื่นๆก็เป็นกัน\nพี่บิว : อย่างงี้นี่เอง แล้วน้องจะไปไหนต่อล่ะคะ\nคุณ : คงกลับไปหาหมออาร์หน่ะครับ\nพี่บิว : งั้นหรอคะ บั้ยบาย",null,"บิวส่งคุณกลับไปหาหมออาร์ม",currentScenario]
                    const message = player_choice[currentScenario][0];
                    const cleanMessage = checkForImage(message);
                    typewriter(cleanMessage, function() {

                    });

                    typewriter(cleanMessage, function() {
