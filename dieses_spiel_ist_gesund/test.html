<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <!-- Create a div to display the Firestore data -->
  <div id="data-display"></div>

  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
  
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDLY7ie39rKxvU_Evkq-VK25uvlVgqm6yQ",
      authDomain: "diesesi-spiel-ist-gesund.firebaseapp.com",
      databaseURL: "https://diesesi-spiel-ist-gesund-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "diesesi-spiel-ist-gesund",
      storageBucket: "diesesi-spiel-ist-gesund.appspot.com",
      messagingSenderId: "419197734080",
      appId: "1:419197734080:web:834d4e0854eed5cec53125"
    };
  
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    
    // Initialize Firestore
    const db = getFirestore(app);

    // Function to read data from Firestore and display it on the page
    async function readData() {
      // Reference to a document in Firestore
      const docRef = doc(db, "multiplayers", "aim5ZUbHWHyAUQTpmg9K");

      // Get the document
      const docSnap = await getDoc(docRef);

      // Get the div where the data will be displayed
      const displayDiv = document.getElementById('data-display');

      // Check if the document exists and display the data
      if (docSnap.exists()) {
        // Create a string representation of the document data
        const data = docSnap.data();
        let content = "<h2>Document Data:</h2>";
        for (const key in data) {
          if (data.hasOwnProperty(key)) {
            content += `<p><strong>${key}:</strong> ${data[key]}</p>`;
          }
        }
        displayDiv.innerHTML = content;
      } else {
        displayDiv.innerHTML = "<p>No such document!</p>";
      }
    }

    // Call the function to read data and display it on the page
    readData();
  </script>
</body>
</html>
